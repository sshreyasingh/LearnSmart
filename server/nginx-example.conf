# ─── LearnSmart — Nginx Reverse Proxy Config (Droplet) ───
# Copy to: /etc/nginx/sites-available/learnsmart
# Then:    sudo ln -s /etc/nginx/sites-available/learnsmart /etc/nginx/sites-enabled/
# Then:    sudo nginx -t && sudo systemctl reload nginx

upstream learnsmart-api {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream learnsmart-ml {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ─── SSL — replace with your actual cert paths ───
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/learnsmart/client/dist;
    index index.html;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # ─── Security headers ───
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ─── API proxy → Express server ───
    location /api/ {
        proxy_pass http://learnsmart-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Static assets (fingerprinted, cache forever) ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── SPA fallback — all other routes serve index.html ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
